<div class="music-player">
    <button class="music-btn" id="prevBtn">⏮</button>
    <button class="music-btn play-btn" id="playBtn">▶</button>
    <button class="music-btn" id="nextBtn">⏭</button>
    <div class="music-info-container">
        <div class="music-info">
            <span class="music-title" id="musicTitle">Call Me Tonight</span>
            <span class="music-divider"> - </span>
            <span class="music-artist" id="musicArtist">Unknown Artist</span>
        </div>
        <div class="progress-area">
            <div class="progress-bar" id="progressBar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="time-display" id="timeDisplay">0:00 / 0:00</div>
        </div>
    </div>
    <canvas id="visualizer" class="visualizer"></canvas>
    <button class="music-btn headlight-btn" id="headlightBtn">💡</button>
    <button class="music-btn train-switch-btn" id="trainSwitchBtn">🚃</button>
</div>
