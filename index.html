<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>铁路轨道3D系统</title>
    <style>
        /* 基础样式 - 保留原有视觉风格，但3D画布区域完全由Three.js接管 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'Segoe UI', 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0b1120 0%, #19233c 100%);
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Three.js 画布容器 */
        #train-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: block;
            outline: none;
            cursor: grab;
        }
        #train-canvas:active {
            cursor: grabbing;
        }

        /* UI 导航面板 (位于上半部分) */
        .container {
            position: relative;
            z-index: 30;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 45vh;
            padding: 60px 20px 20px;
            margin-top: 40px;
            pointer-events: none;
        }
        .container h1,
        .container .subtitle,
        .links,
        .nav-wall,
        .footer {
            pointer-events: auto;
        }

        h1 {
            font-size: 2.5rem;
            color: #fff;
            text-shadow: 0 4px 12px rgba(0,0,0,0.3);
            margin-bottom: 10px;
            letter-spacing: 1px;
        }
        .subtitle {
            color: rgba(255,255,255,0.85);
            font-size: 1rem;
            margin-bottom: 30px;
            backdrop-filter: blur(4px);
        }
        .links {
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 40px;
        }
        .link-btn {
            display: inline-block;
            padding: 12px 32px;
            font-size: 1.1rem;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(135deg, #3a6ea5, #2c3e66);
            border-radius: 40px;
            text-decoration: none;
            transition: all 0.25s ease;
            box-shadow: 0 6px 14px rgba(0,0,0,0.25);
            backdrop-filter: blur(2px);
            border: 1px solid rgba(255,255,255,0.2);
        }
        .link-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 22px rgba(0,0,0,0.3);
            background: linear-gradient(135deg, #4d7db8, #3a4f82);
        }
        .nav-wall {
            background: rgba(20, 28, 40, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 24px 28px;
            width: 100%;
            max-width: 860px;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 12px 28px rgba(0,0,0,0.2);
        }
        .nav-wall h2 {
            color: #f0f3fa;
            text-align: center;
            margin-bottom: 18px;
            font-weight: 500;
            letter-spacing: 1px;
        }
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
        }
        .nav-item {
            background: rgba(255,255,255,0.12);
            border-radius: 18px;
            padding: 12px 8px;
            text-align: center;
            transition: all 0.2s;
            cursor: pointer;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .nav-item:hover {
            background: rgba(255,255,255,0.25);
            transform: translateY(-2px);
        }
        .nav-item a {
            color: #fff;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            word-break: break-word;
        }
        .footer {
            margin-top: 36px;
            color: rgba(255,255,255,0.55);
            font-size: 0.8rem;
            text-align: center;
        }
        @media (max-width: 700px) {
            .nav-grid { grid-template-columns: repeat(2, 1fr); }
            h1 { font-size: 1.8rem; }
            .link-btn { padding: 8px 20px; font-size: 1rem; }
        }
    </style>
    <link rel="stylesheet" href="music/music.css">
    <link rel="stylesheet" href="effects/particles.css">
    <link rel="stylesheet" href="effects/hearts.css">
</head>
<body>
    <canvas id="train-canvas"></canvas>
    
    <div class="container">
        <h1>🚆 Momda_X主页</h1>
        <p class="subtitle">选择要打开的网站</p>
        <div class="links">
            <a href="dcjh/" class="link-btn">调车计划</a>
            <a href="tldt/" class="link-btn">铁路地图</a>
        </div>
        <div class="nav-wall">
            <h2>📌 常用导航</h2>
            <div class="nav-grid">
                <div class="nav-item"><a href="https://github.com/MomdaX" target="_blank">MomdaX主页</a></div>
                <div class="nav-item"><a href="https://okazaki112.github.io/Canvas-Demo/" target="_blank">Canvas合集</a></div>
                <div class="nav-item"><a href="https://www.lddgo.net/" target="_blank">工具软件</a></div>
                <div class="nav-item"><a href="https://www.gaobug.com/bigscreen/#/index" target="_blank">可视化平台</a></div>
                <div class="nav-item"><a href="http://47.96.130.245:8080/train/index.html#/" target="_blank">车站可视化</a></div>
                <div class="nav-item"><a href="http://cnrail.geogv.org/zhcn/" target="_blank">中国铁路地图</a></div>
                <div class="nav-item"><a href="https://spidertools.cn/#/formatHeader" target="_blank">爬虫工具库</a></div>
                <div class="nav-item"><a href="https://doc.vb6.pro/" target="_blank">VB MAN/2</a></div>
            </div>
        </div>
        <div class="footer">© 2026 铁路3D交互 | <a href="https://momdax.github.io" target="_blank">Momda_X主页</a></div>
    </div>


    <script type="importmap">
    {
        "imports": {
            "three": "./huoche/three.module.js"
        }
    }
    </script>
    
    <!-- 主脚本 -->
    <script type="module">
        import TrackBuilder from './huoche/TrackBuilder.js';
        
        window.addEventListener('DOMContentLoaded', async () => {
            // 加载粒子特效
            const particlesRes = await fetch('effects/particles.html');
            document.body.insertAdjacentHTML('afterbegin', await particlesRes.text());
            const { startParticles } = await import('./effects/particles.js');
            startParticles();
            
            // 加载爱心特效
            const heartsRes = await fetch('effects/hearts.html');
            document.body.insertAdjacentHTML('afterbegin', await heartsRes.text());
            const { startHeartAnimation } = await import('./effects/hearts.js');
            startHeartAnimation();
            
            const railway = new TrackBuilder('train-canvas');
            railway.init();
            
            window.railTrackSystem = railway;
            
            // 加载音乐播放器组件
            (async () => {
                const htmlRes = await fetch('music/music.html');
                const html = await htmlRes.text();
                document.body.insertAdjacentHTML('beforeend', html);
                const { initMusicPlayer } = await import('./music/music.js');
                initMusicPlayer();
            })();
        });
        
    </script>
</body>
</html>
